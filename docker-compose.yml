version: '3.9'

services:
  db:
    image: postgres:15
    container_name: postgresql
    restart: always
    volumes:   
      - ./data/db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: salasApi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"

  web:
    build: .
    container_name: django_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db